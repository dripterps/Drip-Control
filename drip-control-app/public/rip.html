<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent}
body{font-family:Inter,Arial,sans-serif}
.stage{width:100vw;height:100vh;display:grid;place-items:start center;padding-top:14px}
.badge{position:relative;width:500px;height:220px;transform-origin:top center;animation:breathe 4s ease-in-out infinite}
.frame{position:absolute;left:50%;top:28px;width:218px;height:166px;transform:translateX(-50%)}
.corner{position:absolute;width:48px;height:48px;filter:drop-shadow(0 0 4px rgba(255,255,255,.25))}
.corner:before,.corner:after{content:"";position:absolute;background:rgba(255,255,255,.94);border-radius:2px}
.corner:before{width:48px;height:2px}.corner:after{width:2px;height:48px}
.tl{left:0;top:0}.tr{right:0;top:0;transform:scaleX(-1)}.bl{left:0;bottom:0;transform:scaleY(-1)}.br{right:0;bottom:0;transform:scale(-1)}
.logo-wrap{position:absolute;left:50%;top:45px;width:144px;height:132px;transform:translateX(-50%);display:grid;place-items:center}
.logo-wrap:before{content:"";position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 66%);filter:blur(9px);animation:aura 4s ease-in-out infinite}
.logo{width:138px;max-height:126px;object-fit:contain;position:relative;filter:drop-shadow(0 0 2px rgba(255,255,255,.9)) drop-shadow(0 0 8px rgba(255,255,255,.22));animation:logoPulse 4s ease-in-out infinite}
.word{position:absolute;height:44px;min-width:110px;padding:0 18px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(18,18,21,.94),rgba(3,3,5,.94));border:1px solid rgba(255,255,255,.86);border-radius:9px;color:#fff;font-size:25px;font-weight:900;letter-spacing:.16em;text-indent:.16em;box-shadow:0 0 0 1px rgba(0,0,0,.8),0 6px 16px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.09);text-shadow:0 0 6px rgba(255,255,255,.22);overflow:hidden}
.word:after{content:"";position:absolute;top:-30%;bottom:-30%;width:30%;left:-60%;transform:skewX(-18deg);background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);animation:sweep 6s ease-in-out infinite}
.rip{left:50%;top:0;transform:translateX(-50%);animation:highlight 6.4s ease-in-out infinite 0s}
.till{left:22px;top:88px;animation:highlight 6.4s ease-in-out infinite 1.6s}
.you{right:22px;top:88px;animation:highlight 6.4s ease-in-out infinite 3.2s}
.hit{left:50%;bottom:0;transform:translateX(-50%);animation:highlight 6.4s ease-in-out infinite 4.8s}
@keyframes breathe{0%,100%{transform:scale(.991)}50%{transform:scale(1)}}
@keyframes aura{0%,100%{opacity:.35;transform:scale(.95)}50%{opacity:.58;transform:scale(1.04)}}
@keyframes logoPulse{0%,100%{transform:scale(.992);opacity:.95}50%{transform:scale(1.018);opacity:1}}
@keyframes highlight{0%,14%,100%{border-color:rgba(255,255,255,.82)}7%{border-color:#fff;box-shadow:0 0 0 1px rgba(0,0,0,.8),0 0 12px rgba(255,255,255,.38),inset 0 1px 0 rgba(255,255,255,.16)}}
@keyframes sweep{0%,62%{left:-60%;opacity:0}68%{opacity:.6}82%{left:135%;opacity:0}100%{left:135%;opacity:0}}
</style></head>
